<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <title>Button EventListener | exercise1</title>
  </head>
  <body class="bg-gray-700">
    <div class="flex ring-2 ring-red-800 p-7 m-6 bg-white w-1/2 h-70 space-y-4">
      <p id="counterDisplay" class="text-gray-700 text-lg">
        You have clicked 0 times
      </p>

      <button
        id="clickButton"
        class="bg-blue-600 w-27 h-10 rounded-xl text-white hover:bg-red-500"
      >
        Click Me
      </button>
    </div>
  </body>
  <script>
    // tracking the click count
    let clickCount = 0;

    const button = document.getElementById("clickButton");
    const display = document.getElementById("counterDisplay");
    //adding event listener
    button.addEventListener("click", function () {
      clickCount++;

      display.textContent = `you have clicked ${clickCount} times`;
    });
  </script>
</html>
