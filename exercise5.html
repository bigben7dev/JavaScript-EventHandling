<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <title>Key Press Tracker</title>
  </head>
  <body
    class="bg-gradient-to-r from-purple-400 to-pink-400 min-h-screen flex items-center justify-center"
  >
    <div class="bg-white rounded-xl shadow-2xl p-8 max-w-md w-full text-center">
      <h1 class="text-2xl font-bold text-gray-800 mb-6">Key Press Tracker</h1>

      <p
        id="keyDisplay"
        class="text-xl text-blue-600 bg-gray-100 rounded-lg p-4 min-h-20 flex items-center justify-center"
      >
        Press any key...
      </p>

      <div class="mt-6 text-sm text-gray-500">
        Click anywhere and press any key on your keyboard
      </div>
    </div>

    <script>
      // Get the paragraph element
      const keyDisplay = document.getElementById("keyDisplay");

      // Listen for keydown events on the entire document
      document.addEventListener("keydown", function (event) {
        // Get the key that was pressed
        const pressedKey = event.key;

        // Update the paragraph text
        keyDisplay.textContent = `Last key pressed: ${pressedKey}`;

        //  Add a little visual feedback
        keyDisplay.classList.add("bg-yellow-100");
        setTimeout(() => {
          keyDisplay.classList.remove("bg-yellow-100");
        }, 200);
      });
    </script>
  </body>
</html>
